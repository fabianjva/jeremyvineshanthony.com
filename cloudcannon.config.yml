collections_config:
  pages:
    path: ""
    output: true
    filter:
      base: strict
    include:
      - index.html
    name: Pages
    icon: home

  blog:
    path: blog
    output: true
    name: Blog Articles
    icon: notes
    _enabled_editors:
      - content
      - visual
    schemas:
      default:
        path: .cloudcannon/schemas/blog-post.html

  gallery:
    path: images/gallery
    output: false
    name: Photo Gallery
    icon: image
    _enabled_editors:
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/gallery-item.md

uploads_dir: images/uploads

_inputs:
  title:
    label: Title
    type: text
  date:
    label: Date
    type: date
  category:
    label: Category
    type: select
    options:
      values:
        - Criminal Law
        - Civil Litigation
        - Corporate & Commercial
        - Employment Law
        - Family & Probate
        - Tax Law
        - Intellectual Property
        - General
  summary:
    label: Summary
    type: textarea
  image:
    label: Photo
    type: image
    uploads_dir: images/gallery
  caption:
    label: Caption
    type: text
