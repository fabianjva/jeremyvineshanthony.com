backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Category", name: "category", widget: "select", options: ["Criminal Law", "Civil Litigation", "Corporate & Commercial", "Employment Law", "Family & Probate", "Tax Law", "Intellectual Property", "General"]}
      - {label: "Summary", name: "summary", widget: "text"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "gallery"
    label: "Photo Gallery"
    folder: "gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Photo", name: "image", widget: "image"}
      - {label: "Caption", name: "caption", widget: "string", required: false}
      - {label: "Category", name: "category", widget: "select", options: ["Office", "Court", "Events", "Team", "Awards"]}

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "settings.json"
        fields:
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Address", name: "address", widget: "text"}
          - {label: "Office Hours", name: "hours", widget: "string"}
          - {label: "WhatsApp Number", name: "whatsapp", widget: "string"}
